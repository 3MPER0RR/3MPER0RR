name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        with:
          USERNAME: 3MPER0RR
          SETTING_JSON: |
            {
              "type": "night",
              "color": "green"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
